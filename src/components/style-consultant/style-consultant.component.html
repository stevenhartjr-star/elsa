<div class="h-[80vh] flex flex-col bg-zinc-900/50 rounded-3xl shadow-2xl border border-white/5 overflow-hidden animate-fade-in relative">
    <!-- Header -->
    <div class="bg-zinc-900/90 backdrop-blur-sm text-white p-6 flex justify-between items-center border-b border-white/5 z-10">
        <div>
            <h2 class="font-display font-bold text-xl tracking-tight">AURA</h2>
            <p class="text-xs text-purple-600 font-bold uppercase tracking-widest mt-1">AI Creative Partner</p>
        </div>
        <div class="w-3 h-3 rounded-full bg-green-400 animate-pulse shadow-[0_0_10px_rgba(74,222,128,0.5)]"></div>
    </div>

    <!-- Chat Area -->
    <div class="flex-1 overflow-y-auto p-6 space-y-6 bg-zinc-900/30" #chatContainer>
        @for(msg of messages(); track $index) {
            <div class="flex gap-4" [class.flex-row-reverse]="msg.role === 'user'">
                <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center shadow-sm border border-white/5"
                     [class]="msg.role === 'model' ? 'bg-zinc-800' : 'bg-slate-900'">
                     @if(msg.role === 'model') {
                        <div class="relative w-full h-full flex items-center justify-center rounded-full overflow-hidden">
                             <div class="absolute inset-0 bg-gradient-pop opacity-20"></div>
                             <span class="text-lg text-purple-600 font-display font-bold">A</span>
                            @if(isSpeaking() && $last) {
                                <div class="absolute inset-0 rounded-full border-2 border-purple-400 animate-ping"></div>
                            }
                        </div>
                     } @else {
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                     }
                </div>
                <div class="max-w-[80%] p-5 rounded-2xl shadow-sm text-sm font-medium leading-relaxed"
                     [class]="msg.role === 'model' ? 'bg-zinc-800 text-zinc-200 rounded-tl-none border border-white/5' : 'bg-slate-900 text-white rounded-tr-none'">
                     
                     @if(msg.isVideo) {
                        <div class="space-y-3">
                            <div class="flex items-center gap-2 font-bold text-white">
                                <svg class="animate-spin h-4 w-4 text-purple-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <span>Nano-Pro Video Render</span>
                            </div>
                            <p class="text-xs text-zinc-400 font-mono bg-zinc-900/50 p-2 rounded-lg border border-white/5">{{ msg.videoGenerationStatus }}</p>
                            @if(msg.videoUrl) {
                                <div class="mt-2 rounded-xl overflow-hidden shadow-lg">
                                    <video [src]="msg.videoUrl" class="w-full" controls autoplay muted loop></video>
                                </div>
                            }
                        </div>
                     } @else {
                        <div [innerHTML]="msg.html || msg.text"></div>
                     }
                </div>
            </div>
        }
    </div>

    <!-- Input Area -->
    <div class="p-4 bg-zinc-900/80 border-t border-white/5 relative z-10">
        @if (userUploadedImage()) {
            <div class="absolute bottom-full left-6 mb-2 animate-fade-in">
                 <div class="inline-flex items-center gap-2 bg-zinc-800 px-4 py-2 rounded-xl text-xs font-bold text-zinc-200 border border-white/5 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                    Image Attached
                    <button (click)="userUploadedImage.set(null)" class="ml-2 hover:text-red-500 font-bold text-lg leading-none">&times;</button>
                </div>
            </div>
        }

        <div class="flex items-center gap-3">
            <label class="p-3 text-zinc-400 hover:text-purple-600 hover:bg-white/5 rounded-xl cursor-pointer transition-all" title="Upload Reference Photo">
                <input type="file" class="hidden" accept="image/*" (change)="handleImageUpload($event)">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </label>
            
            <input #input 
                   type="text" 
                   (keyup.enter)="sendMessage()"
                   placeholder="Speak or type your vision..."
                   [disabled]="isLoading()"
                   class="flex-1 bg-zinc-900/50 border border-white/5 rounded-2xl px-6 py-4 text-white placeholder-zinc-500 focus:ring-4 focus:ring-purple-500/20 focus:border-purple-500 outline-none transition-all font-medium">
            
            <button (click)="toggleVoiceListening()" title="Activate Voice Command" class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all transform hover:-translate-y-0.5 shadow-sm hover:shadow-md"
                [class]="isListening() ? 'bg-rose-500 text-white shadow-rose-200' : 'bg-zinc-800 border border-white/5 text-zinc-400 hover:border-white/10 hover:text-zinc-300'">
                 @if (isListening()) {
                    <div class="w-5 h-5 bg-white rounded-full animate-pulse"></div>
                 } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd" /></svg>
                 }
            </button>
             <button (click)="voiceOutputEnabled.set(!voiceOutputEnabled())" title="Toggle Voice Output" class="w-12 h-12 rounded-2xl flex items-center justify-center transition-all transform hover:-translate-y-0.5 shadow-sm hover:shadow-md"
                [class]="voiceOutputEnabled() ? 'bg-gradient-pop text-white shadow-purple-200' : 'bg-zinc-800 border border-white/5 text-zinc-400 hover:border-white/10 hover:text-zinc-300'">
                @if (voiceOutputEnabled()) {
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 12.586V8a6 6 0 00-6-6zM10 16a3 3 0 01-3-3h6a3 3 0 01-3 3z" /></svg>
                } @else {
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd" /><path stroke-linecap="round" stroke-linejoin="round" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></svg>
                }
            </button>
        </div>
    </div>
</div>
