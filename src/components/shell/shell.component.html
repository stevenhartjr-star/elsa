@if (analysisResult(); as result) {
    <div class="flex h-screen bg-[#09090b] text-zinc-100">
        <app-sidebar (moduleSelected)="handleModuleSelected($event)" [activeModule]="activeModule()"></app-sidebar>
        
        <main class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 custom-scrollbar relative">
            <button (click)="showTutorial.set(true)" class="absolute top-6 right-8 px-5 py-2.5 bg-gradient-to-r from-purple-600 to-pink-600 text-white border border-white/10 rounded-full text-xs font-bold uppercase tracking-widest hover:shadow-lg hover:shadow-purple-500/30 transition-all flex items-center gap-2 z-10 transform hover:-translate-y-0.5">
                <span class="absolute -top-1 -right-1 flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-pink-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-pink-500"></span>
                </span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Watch Tutorial
            </button>
            <div class="max-w-7xl mx-auto space-y-6 mt-12 sm:mt-0">
                @switch (activeModule()) {
                    @case ('dashboard') {
                        <app-dashboard [analysisResult]="result"></app-dashboard>
                    }
                    @case ('retail') {
                        <app-retail [analysis]="result.analysis"></app-retail>
                    }
                    @case ('employees') {
                        <app-stylist-hub [analysis]="result.analysis"></app-stylist-hub>
                    }
                    @case ('clients') {
                        <app-clients [reviews]="result.analysis.rawReviews"></app-clients>
                    }
                    @case ('marketing') {
                        <app-marketing-studio [analysis]="result.analysis"></app-marketing-studio>
                    }
                    @case ('reports') {
                        <app-trend-spotter [businessName]="result.analysis.businessName"></app-trend-spotter>
                    }
                    @case ('advisor') {
                        <app-style-consultant></app-style-consultant>
                    }
                }
            </div>
        </main>
    </div>
    
    @if (showTutorial()) {
        <app-tutorial (close)="showTutorial.set(false)"></app-tutorial>
    }
}
