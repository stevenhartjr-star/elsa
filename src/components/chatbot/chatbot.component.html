<div class="bg-zinc-900 p-4 sm:p-6 rounded-3xl border border-white/5 shadow-xl shadow-purple-900/10 flex flex-col h-[80vh] animate-fade-in">
    <div class="flex-1 overflow-y-auto pr-4 -mr-4" #chatContainer>
        <div class="space-y-6">
            @for (message of messages(); track $index) {
                <div class="flex items-start gap-4" [class.flex-row-reverse]="message.role === 'user'">
                    <!-- Avatar -->
                    <div class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center shadow-md"
                         [class]="message.role === 'model' ? 'bg-zinc-800 border border-white/5' : 'bg-purple-600'">
                        @if (message.role === 'model') {
                            <div class="w-6 h-6 bg-gradient-pop rounded-md"></div>
                        } @else {
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                            </svg>
                        }
                    </div>

                    <!-- Message Bubble -->
                    <div class="p-5 rounded-2xl max-w-lg shadow-sm text-sm font-medium leading-relaxed"
                         [class]="message.role === 'model' ? 'bg-zinc-800 text-zinc-300 rounded-tl-none border border-white/5' : 'bg-purple-600 text-white rounded-tr-none'">
                         <!-- Using innerHTML to render formatted AI responses. -->
                        <div [innerHTML]="message.html || message.text"></div>
                    </div>
                </div>
            }
        </div>
    </div>
    <div class="mt-6 pt-4 border-t border-white/5">
        @if (error()) {
            <p class="text-sm text-rose-400 mb-2 text-center bg-rose-500/10 border border-rose-500/20 py-2 rounded-xl">{{ error() }}</p>
        }
        <div class="flex items-center gap-3">
            <input #inputElement 
                   type="text" 
                   (keyup.enter)="sendMessage(inputElement)"
                   placeholder="Ask a follow-up question..." 
                   [disabled]="isLoading()"
                   class="w-full px-6 py-4 bg-zinc-800/50 border border-white/10 rounded-2xl text-white focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all duration-200 placeholder-zinc-500 disabled:opacity-50 outline-none">
            
            <button (click)="sendMessage(inputElement)" 
                    [disabled]="isLoading()"
                    class="p-4 bg-gradient-pop text-white rounded-2xl hover:shadow-lg hover:shadow-purple-500/30 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                </svg>
            </button>
        </div>
    </div>
</div>
